<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="AI-powered talent scouting agent — paste a job description and instantly see ranked candidate matches with engagement signals.">
  <title>Talent Scout — AI Candidate Matching</title>
  <style>
    /* reset & root */
    :root {
      --bg: #F7F6F3;
      --surface: #FFFFFF;
      --surface-2: #F2F1EE;
      --border: #E4E2DC;
      --border-strong: #C9C7C0;
      --text-primary: #1A1916;
      --text-secondary: #6B6963;
      --text-tertiary: #A09D97;
      --accent: #5B4FE8;
      --accent-light: #EEEDFE;
      --accent-text: #3730A3;
      --match: #0F766E;
      --match-bg: #CCFBF1;
      --interest: #7C3AED;
      --interest-bg: #EDE9FE;
      --high: #059669;
      --high-bg: #D1FAE5;
      --medium: #D97706;
      --medium-bg: #FEF3C7;
      --low: #DC2626;
      --low-bg: #FEE2E2;
      --rank-gold: #92400E;
      --rank-gold-bg: #FEF3C7;
      --rank-silver: #374151;
      --rank-silver-bg: #F3F4F6;
      --rank-bronze: #78350F;
      --rank-bronze-bg: #FEF9C3;
      --font-sans: 'Inter', 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: 56px;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-dot {
      color: var(--text-tertiary);
      font-size: 10px;
    }

    .header-tagline {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .header-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--high);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header-badge-dot {
      width: 6px;
      height: 6px;
      background: var(--high);
      border-radius: 50%;
      display: inline-block;
    }

    /* layout */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 40px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
    }

    /* left panel */
    .panel-left {
      position: sticky;
      top: 88px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    /* textarea & button */
    textarea {
      width: 100%;
      min-height: 220px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-primary);
      resize: vertical;
      transition: border-color 150ms, box-shadow 150ms;
    }

    textarea::placeholder {
      color: var(--text-tertiary);
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 79, 232, 0.1);
    }

    button#analyzeBtn {
      width: 100%;
      margin-top: 12px;
      height: 44px;
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 150ms, transform 100ms;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button#analyzeBtn:hover {
      background: #4C42D1;
    }

    button#analyzeBtn:active {
      transform: scale(0.985);
    }

    button#analyzeBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* parsed strip */
    .parsed-info {
      margin-top: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: none;
    }

    .parsed-info .parsed-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .parsed-info .parsed-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    .parsed-info .parsed-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .parsed-info .metric-card {
      text-align: center;
    }

    .parsed-info .metric-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .parsed-info .metric-value {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .metric-value.mv-accent {
      color: var(--accent);
    }

    .metric-value.mv-match {
      color: var(--match);
    }

    .metric-value.mv-interest {
      color: var(--interest);
    }

    /* results panel */
    .panel-right {
      min-width: 0;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .results-count-badge {
      background: var(--accent-light);
      color: var(--accent-text);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 2px 8px;
      border-radius: 4px;
      display: none;
    }

    .results-sort-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* empty state */
    .empty-state {
      text-align: center;
      color: var(--text-tertiary);
      padding: 80px 24px;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty-state .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    /* candidate card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      transition: border-color 150ms, box-shadow 150ms;
      opacity: 0;
      transform: translateY(8px);
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rank-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .rank-1 {
      background: var(--rank-gold-bg);
      color: var(--rank-gold);
    }

    .rank-2 {
      background: var(--rank-silver-bg);
      color: var(--rank-silver);
    }

    .rank-3 {
      background: var(--rank-bronze-bg);
      color: var(--rank-bronze);
    }

    .rank-other {
      background: var(--surface-2);
      color: var(--text-secondary);
    }

    .card-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      flex-shrink: 0;
    }

    .card-name-block {
      display: flex;
      flex-direction: column;
      flex: 1;
      margin: 0 12px;
      min-width: 0;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-title {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-secondary);
    }

    .avail-tag {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .avail-immediate {
      background: #D1FAE5;
      color: #065F46;
    }

    .avail-2weeks {
      background: #FEF3C7;
      color: #92400E;
    }

    .avail-1month {
      background: #FEE2E2;
      color: #991B1B;
    }

    .card-score-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      flex-shrink: 0;
      margin-left: auto;
    }

    .card-final-score {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--accent);
      line-height: 1;
    }

    .card-score-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .score-high {
      color: var(--accent);
    }

    .score-mid {
      color: var(--medium);
    }

    .score-low {
      color: var(--low);
    }

    /* score bars */
    .score-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 14px;
    }

    .bar-group {
      display: flex;
      flex-direction: column;
    }

    .bar-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-tertiary);
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .bar-label .bar-value {
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-mono);
      text-transform: none;
      letter-spacing: 0;
    }

    .bar-match .bar-value {
      color: var(--match);
    }

    .bar-interest .bar-value {
      color: var(--interest);
    }

    .bar-track {
      height: 6px;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-match .bar-track {
      background: var(--match-bg);
    }

    .bar-interest .bar-track {
      background: var(--interest-bg);
    }

    .bar-fill {
      height: 100%;
      border-radius: 999px;
      width: 0;
      transition: width 700ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .bar-match .bar-fill {
      background: var(--match);
    }

    .bar-interest .bar-fill {
      background: var(--interest);
    }

    /* why ranked */
    .why-text {
      margin-top: 14px;
      padding: 10px 14px;
      background: var(--surface-2);
      border-radius: 8px;
      border-left: 3px solid var(--accent-light);
      font-size: 12.5px;
      font-weight: 400;
      line-height: 1.65;
      color: var(--text-secondary);
    }

    /* skills */
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .pill {
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .pill-match {
      background: #D1FAE5;
      color: #065F46;
    }

    .pill-miss {
      background: #FEE2E2;
      color: #991B1B;
    }

    /* collapsibles */
    .collapsible {
      margin-top: 14px;
    }

    .collapsible+.collapsible {
      margin-top: 8px;
    }

    .collapsible summary {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: border-color 150ms;
    }

    .collapsible summary::-webkit-details-marker {
      display: none;
    }

    .collapsible summary::before {
      content: '▶';
      font-size: 8px;
      display: inline-block;
      transition: transform 250ms ease-in-out;
    }

    .collapsible[open] summary::before {
      transform: rotate(90deg);
    }

    .collapsible summary:hover {
      border-color: var(--border-strong);
    }

    .collapsible-content {
      margin-top: 8px;
      padding: 12px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
      overflow: hidden;
    }

    .reply-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.55;
      color: var(--text-secondary);
    }

    .reply-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .reply-item:first-child {
      padding-top: 0;
    }

    .reply-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .interest-high {
      color: var(--high);
    }

    .interest-medium {
      color: var(--medium);
    }

    .interest-low {
      color: var(--low);
    }

    /* animations */
    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    /* responsive */
    @media (max-width: 860px) {
      .container {
        grid-template-columns: 1fr;
        padding: 24px 16px;
      }

      .panel-left {
        position: static;
      }

      header {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="header-left">
      <span class="header-title">Talent Scout</span>
      <span class="header-dot">·</span>
      <span class="header-tagline">AI-powered candidate matching</span>
    </div>
    <div class="header-badge">
      <span class="header-badge-dot"></span>
      API Ready
    </div>
  </header>

  <div class="container">
    <div class="panel-left">
      <div class="section-label">Job Description</div>
      <textarea id="jdInput" placeholder="Paste your job description here...

Tip: Include required skills, years of experience, and location preference for better matching."></textarea>
      <button id="analyzeBtn" onclick="analyze()">Find Candidates</button>
      <div class="parsed-info" id="parsedInfo"></div>
    </div>

    <div class="panel-right">
      <div class="results-header">
        <div class="results-header-left">
          <div class="section-label" style="margin-bottom:0">Ranked Candidates</div>
          <div class="results-count-badge" id="resultsCount"></div>
        </div>
        <div class="results-sort-label">sorted by final score</div>
      </div>
      <div id="results">
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          Paste a job description and click <strong>Find Candidates</strong> to see ranked matches.
        </div>
      </div>
    </div>
  </div>

  <script>
    const AVATAR_COLORS = ['#5B4FE8', '#0F766E', '#D97706', '#DC2626', '#059669', '#7C3AED'];

    function getAvatarColor(name) {
      return AVATAR_COLORS[name.charCodeAt(0) % 6];
    }

    function getInitials(name) {
      const parts = name.split(' ');
      return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
    }

    async function analyze() {
      const jd = document.getElementById('jdInput').value.trim();
      if (!jd) return;

      const btn = document.getElementById('analyzeBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Scanning candidates...';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ jd_text: jd })
        });
        const data = await res.json();
        showParsedJD(data.parsed_jd, data.ranked_candidates);
        renderResults(data.ranked_candidates);
      } catch (e) {
        document.getElementById('results').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>Something went wrong. Is the server running?</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Find Candidates';
      }
    }

    function showParsedJD(p, candidates) {
      const el = document.getElementById('parsedInfo');
      el.style.display = 'block';

      const topMatch = candidates.length ? Math.max(...candidates.map(c => c.match_score)) : 0;
      const avgInterest = candidates.length ? Math.round(candidates.reduce((s, c) => s + c.interest_score, 0) / candidates.length) : 0;

      el.innerHTML = `
        <div class="parsed-pills">
          <span class="parsed-pill">${p.required_skills.length} required skills</span>
          <span class="parsed-pill">${p.preferred_skills.length} preferred</span>
          <span class="parsed-pill">${p.min_years_experience}+ years</span>
          <span class="parsed-pill">${p.role_level}</span>
          <span class="parsed-pill">${p.location_preference}</span>
        </div>
        <div class="parsed-metrics">
          <div class="metric-card">
            <div class="metric-label">Scanned</div>
            <div class="metric-value mv-accent">${candidates.length}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Top Match</div>
            <div class="metric-value mv-match">${topMatch}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Avg Interest</div>
            <div class="metric-value mv-interest">${avgInterest}</div>
          </div>
        </div>`;
    }

    function renderResults(candidates) {
      const el = document.getElementById('results');
      const countBadge = document.getElementById('resultsCount');

      if (!candidates.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🤷</div>No candidates found.</div>';
        countBadge.style.display = 'none';
        return;
      }

      countBadge.style.display = 'inline-block';
      countBadge.textContent = candidates.length;

      el.innerHTML = candidates.map((c, i) => {
        const rankClass = c.rank <= 3 ? `rank-${c.rank}` : 'rank-other';
        const scoreClass = c.final_score >= 70 ? 'score-high' : c.final_score >= 45 ? 'score-mid' : 'score-low';
        const availClass = c.availability === 'immediate' ? 'avail-immediate' : c.availability === '2 weeks' ? 'avail-2weeks' : 'avail-1month';
        const avatarColor = getAvatarColor(c.candidate_name);
        const initials = getInitials(c.candidate_name);
        const interestClass = c.interest_level === 'high' ? 'interest-high' : c.interest_level === 'medium' ? 'interest-medium' : 'interest-low';

        return `
          <div class="card" data-index="${i}">
            <div class="card-header">
              <div class="rank-badge ${rankClass}">${c.rank}</div>
              <div class="card-avatar" style="background:${avatarColor}">${initials}</div>
              <div class="card-name-block">
                <div class="card-name">${c.candidate_name}</div>
                <div class="card-title">${c.title}</div>
              </div>
              <span class="avail-tag ${availClass}">${c.availability}</span>
              <div class="card-score-block">
                <div class="card-final-score ${scoreClass}">${c.final_score}</div>
                <div class="card-score-label">final score</div>
              </div>
            </div>
            <div class="score-bars">
              <div class="bar-group bar-match">
                <div class="bar-label"><span>Match</span><span class="bar-value">${c.match_score}/100</span></div>
                <div class="bar-track"><div class="bar-fill" data-width="${c.match_score}"></div></div>
              </div>
              <div class="bar-group bar-interest">
                <div class="bar-label"><span>Interest</span><span class="bar-value">${c.interest_score}/100</span></div>
                <div class="bar-track"><div class="bar-fill" data-width="${c.interest_score}"></div></div>
              </div>
            </div>
            <div class="why-text">${c.why_ranked}</div>
            <div class="pills">
              ${c.matched_skills.map(s => `<span class="pill pill-match">✓ ${s}</span>`).join('')}
              ${c.missed_skills.map(s => `<span class="pill pill-miss">✗ ${s}</span>`).join('')}
            </div>
            <details class="collapsible">
              <summary>Outreach message</summary>
              <div class="collapsible-content">${c.outreach_message}</div>
            </details>
            <details class="collapsible">
              <summary>Simulated replies <span class="${interestClass}">(${c.interest_level} interest)</span></summary>
              <div class="collapsible-content">
                ${c.candidate_replies.map((r, ri) => `<div class="reply-label">Reply ${ri + 1}</div><div class="reply-item">"${r}"</div>`).join('')}
              </div>
            </details>
          </div>`;
      }).join('');

      requestAnimationFrame(() => {
        const cards = el.querySelectorAll('.card');
        cards.forEach((card, i) => {
          setTimeout(() => {
            card.style.animation = `cardFadeIn 300ms ease forwards`;
            const fills = card.querySelectorAll('.bar-fill');
            setTimeout(() => {
              fills.forEach(fill => {
                fill.style.width = fill.dataset.width + '%';
              });
            }, 50);
          }, i * 80);
        });
      });
    }
  </script>
</body>

</html>
